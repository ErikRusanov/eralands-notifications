# Тексты сообщений и описаний команд бота.
# Загружаются классом Replies при старте сервиса.
# Ключ messages.<key> соответствует методу Replies.<key>().
# Ключ commands.<name> соответствует BotCommand("<name>") в utils/commands.py.
# Поддерживается HTML-разметка (parse_mode=HTML установлен на боте глобально).

[messages.start_welcome]
text = "Привет! Это бот сервиса <b>Eralands Notifications</b>"

[messages.start_welcome_named]
text = "Привет, {name}! Это бот сервиса <b>Eralands Notifications</b>"

[messages.echo]
variants = [
    "Я бот для отправки уведомлений с лендингов, прием сообщений не закладывали, можно только связать свой лендинг через /link 🤖",
    "Сорри, читать входящие я не умею, моя задача доставлять заявки с лендингов в чат, подключить лендинг можно через /link 😅",
    "Привет! Это технический бот для уведомлений, отвечать на сообщения не научили, для связи своего лендинга используйте /link 🔔",
    "Я работаю в одну сторону, гоняю заявки с лендинга в ваш чат, обратной связи не закладывали, но если нужно подключить лендинг, есть /link 📤",
    "Принимать сообщения не научили, зато заявки шлю исправно! Чтобы подключить свой лендинг, отправьте /link 🚀",
    "Чат-функционал не реализован, я только пересылаю заявки с лендингов, а подключить свой лендинг можно через /link 🛠",
]

[commands.start]
description = "Запустить бота"
