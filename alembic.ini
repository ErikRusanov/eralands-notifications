# alembic.ini — конфигурация Alembic для сервиса notifications.
# URL подключения подставляется в alembic/env.py из настроек приложения.

[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url намеренно пустой — env.py читает его из settings.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
